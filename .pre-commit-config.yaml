repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=500]

  - repo: local
    hooks:
      - id: bgs-compliance
        name: BGS compliance check
        description: Run the BGS adopter validator on docs/governance/BGS.md / docs/governance/bgs-decision.yaml
        entry: python3 -m pytest tests/test_bgs_compliance.py -q
        language: system
        pass_filenames: false
        files: ^(docs/governance/BGS\.md|docs/governance/bgs-decision\.yaml|docs/ucc-declarations\.yaml|docs/schemas/.*)$
