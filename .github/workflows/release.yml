name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Stable tag to publish and sync
        required: true
        type: string

jobs:
  build-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Resolve release tag
        id: release_tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          case "$tag" in
            *-*)
              echo "Stable tags only: $tag"
              exit 1
              ;;
          esac
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release_tag.outputs.tag }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests
        run: |
          python -m pip install --upgrade pip
          python -m unittest tests.test_web tests.test_cli -v

      - name: Build source distribution
        run: |
          python -m pip install --upgrade pip build
          python -m build --sdist

      - name: Rename release artifact
        run: |
          mkdir -p release
          artifact=$(find dist -maxdepth 1 -name '*.tar.gz' -print -quit)
          cp "$artifact" "release/ariaflow-web-${{ steps.release_tag.outputs.tag }}.tar.gz"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          prerelease: false
          tag_name: ${{ steps.release_tag.outputs.tag }}

      - name: Checkout tap
        uses: actions/checkout@v4
        with:
          repository: bonomani/homebrew-ariaflow
          token: ${{ secrets.ARIAFLOW_TAP_TOKEN }}
          path: tap

      - name: Update tap formula
        run: |
          python3 scripts/homebrew_formula.py --tag "${{ steps.release_tag.outputs.tag }}" --output tap/Formula/ariaflow-web.rb

      - name: Commit tap update
        working-directory: tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/ariaflow-web.rb
          if git diff --cached --quiet; then
            echo "Formula already up to date"
            exit 0
          fi
          git commit -m "Update ariaflow-web formula to ${{ steps.release_tag.outputs.tag }}"
          git push

      - name: Verify tap version
        run: |
          expected="${{ steps.release_tag.outputs.tag }}"
          expected="${expected#v}"
          current=$(python3 -c 'from pathlib import Path; import re; text = Path("tap/Formula/ariaflow-web.rb").read_text(encoding="utf-8"); match = re.search(r"^  version \"([^\"]+)\"$", text, re.MULTILINE); print(match.group(1) if match else "")')
          test "$current" = "$expected"
