name: release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Stable version to release, for example 0.1.30
        required: true
        type: string

jobs:
  build-release:
    if: github.event_name != 'push' || github.ref != 'refs/heads/main' || !startsWith(github.event.head_commit.message, 'Release ')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: release_meta
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            tag="${GITHUB_REF_NAME}"
            version="${tag#v}"
            ref="$tag"
            should_tag_push=false
          else
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              version="${{ inputs.version }}"
              python3 -c 'import re, sys; version = sys.argv[1]; assert re.fullmatch(r"\d+\.\d+\.\d+", version), f"Unsupported version format: {version!r}"' "$version"
            else
              version="$(python3 -c 'from pathlib import Path; import re; text = Path("pyproject.toml").read_text(encoding="utf-8"); match = re.search(r"^version = \"([^\"]+)\"$", text, re.MULTILINE); assert match, "version not found"; major, minor, patch = map(int, match.group(1).split(".")); print(f"{major}.{minor}.{patch + 1}")')"
            fi
            tag="v${version}"
            ref="main"
            should_tag_push=true
          fi
          case "$tag" in
            *-*)
              echo "Stable tags only: $tag"
              exit 1
              ;;
          esac
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "should_tag_push=$should_tag_push" >> "$GITHUB_OUTPUT"

      - name: Set up git identity
        if: steps.release_meta.outputs.should_tag_push == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version, commit, and tag
        if: steps.release_meta.outputs.should_tag_push == 'true'
        env:
          RELEASE_VERSION: ${{ steps.release_meta.outputs.version }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.tag }}
        run: |
          git rev-parse -q --verify "refs/tags/${RELEASE_TAG}" >/dev/null && { echo "Tag already exists: ${RELEASE_TAG}"; exit 1; }
          python3 -c 'from pathlib import Path; import os, re; root = Path("."); version = os.environ["RELEASE_VERSION"]; pyproject = root / "pyproject.toml"; package_init = root / "src" / "ariaflow_web" / "__init__.py"; text = pyproject.read_text(encoding="utf-8"); text = re.sub(r"^version = \"[^\"]+\"$", f"version = \"{version}\"", text, flags=re.MULTILINE); pyproject.write_text(text, encoding="utf-8"); text = package_init.read_text(encoding="utf-8"); text = re.sub(r"^__version__ = \"[^\"]+\"$", f"__version__ = \"{version}\"", text, flags=re.MULTILINE); package_init.write_text(text, encoding="utf-8")'
          git add pyproject.toml src/ariaflow_web/__init__.py
          git diff --cached --quiet && { echo "Release version already committed"; exit 1; }
          git commit -m "Release ariaflow-web $RELEASE_VERSION"
          git tag "$RELEASE_TAG"
          git push origin HEAD:main
          git push origin "$RELEASE_TAG"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests
        run: |
          python -m pip install --upgrade pip
          python -m unittest tests.test_web tests.test_cli -v

      - name: Build source distribution
        run: |
          python -m pip install --upgrade pip build
          python -m build --sdist

      - name: Rename release artifact
        run: |
          mkdir -p release
          artifact=$(find dist -maxdepth 1 -name '*.tar.gz' -print -quit)
          cp "$artifact" "release/ariaflow-web-${{ steps.release_meta.outputs.tag }}.tar.gz"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          prerelease: false
          tag_name: ${{ steps.release_meta.outputs.tag }}

      - name: Assert tap token is configured
        env:
          TAP_TOKEN: ${{ secrets.ARIAFLOW_TAP_TOKEN }}
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "Missing ARIAFLOW_TAP_TOKEN secret; cannot update bonomani/homebrew-ariaflow"
            exit 1
          fi

      - name: Checkout tap
        uses: actions/checkout@v4
        with:
          repository: bonomani/homebrew-ariaflow
          token: ${{ secrets.ARIAFLOW_TAP_TOKEN }}
          path: tap

      - name: Update tap formula
        run: |
          python3 scripts/homebrew_formula.py --tag "${{ steps.release_meta.outputs.tag }}" --output tap/Formula/ariaflow-web.rb

      - name: Commit tap update
        working-directory: tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/ariaflow-web.rb
          if git diff --cached --quiet; then
            echo "Formula already up to date"
            exit 0
          fi
          git commit -m "Update ariaflow-web formula to ${{ steps.release_meta.outputs.tag }}"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Verify tap version
        run: |
          expected="${{ steps.release_meta.outputs.tag }}"
          expected="${expected#v}"
          current=$(python3 -c 'from pathlib import Path; import re; text = Path("tap/Formula/ariaflow-web.rb").read_text(encoding="utf-8"); match = re.search(r"^  version \"([^\"]+)\"$", text, re.MULTILINE); print(match.group(1) if match else "")')
          test "$current" = "$expected"

      - name: Verify published tap formula
        run: |
          python3 - <<'PY'
          from urllib.request import urlopen
          import re

          expected = "${{ steps.release_meta.outputs.version }}"
          url = "https://raw.githubusercontent.com/bonomani/homebrew-ariaflow/main/Formula/ariaflow-web.rb"
          text = urlopen(url, timeout=20).read().decode("utf-8")
          match = re.search(r'^  version "([^"]+)"$', text, re.MULTILINE)
          current = match.group(1) if match else ""
          if current != expected:
              raise SystemExit(f"Published tap formula mismatch: expected {expected}, got {current or 'missing'}")
          print(f"Published tap formula is {current}")
          PY
