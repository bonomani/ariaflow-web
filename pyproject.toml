[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "ariaflow-web"
version = "0.1.276"
description = "Local dashboard frontend for ariaflow"
requires-python = ">=3.10"
dependencies = []

[project.optional-dependencies]
local = ["ariaflow"]

[project.scripts]
ariaflow-web = "ariaflow_web.cli:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
ariaflow_web = ["static/*", "static/_fragments/*"]

[tool.pytest.ini_options]
addopts = "-m 'not slow'"
markers = [
    "slow: marks tests that require a browser (Playwright)",
]
