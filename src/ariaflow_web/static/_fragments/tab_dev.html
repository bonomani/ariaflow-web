      <!-- DEV -->
      <div class="span-6" x-show="page === 'dev'">
        <div class="panel">
          <div class="section-title">
            <h2>API Documentation</h2>
            <div class="hint">Interactive Swagger UI and OpenAPI spec</div>
          </div>
          <div class="row">
            <button @click="openDocs()">Open Swagger UI</button>
            <button @click="openSpec()">Download OpenAPI spec</button>
          </div>
        </div>
      </div>

      <div class="span-6" x-show="page === 'dev'">
        <div class="panel">
          <div class="section-title">
            <h2>Server Metrics</h2>
            <button @click="refresh()">Refresh</button>
          </div>
          <div class="chips">
            <div class="chip">Uptime <strong x-text="healthUptimeText">-</strong></div>
            <div class="chip">Requests <strong x-text="lastHealth?.requests_total ?? '-'">-</strong></div>
            <div class="chip" :class="{ 'badge warn': lastHealth?.errors_total }">Errors <strong x-text="lastHealth?.errors_total ?? '-'">-</strong></div>
            <div class="chip">SSE clients <strong x-text="lastHealth?.sse_clients ?? '-'">-</strong></div>
          </div>
          <div class="chips mt-sm">
            <div class="chip">Received <strong x-text="lastHealth?.bytes_received_total != null ? formatBytes(lastHealth.bytes_received_total) : '-'">-</strong></div>
            <div class="chip">Sent <strong x-text="lastHealth?.bytes_sent_total != null ? formatBytes(lastHealth.bytes_sent_total) : '-'">-</strong></div>
          </div>
        </div>
      </div>
      <div class="span-6" x-show="page === 'dev'">
        <div class="panel">
          <div class="section-title">
            <h2>Test Suite</h2>
            <div class="hint">Run the backend test suite from the dashboard</div>
          </div>
          <div class="row mb-md">
            <button :class="{ secondary: testRunning }" @click="runTests()" :disabled="testRunning">Run tests</button>
          </div>
          <div class="item" x-show="testSummaryVisible">
            <div class="item-top">
              <div class="item-url">Results</div>
              <span :class="testBadgeClass" x-text="testBadgeText">-</span>
            </div>
            <div class="meta"><span x-text="testCountsText">-</span></div>
          </div>
          <div class="list mt-md">
            <template x-for="t in testResults" :key="t.name || t.test || 'unknown'">
              <template x-if="!t._placeholder">
                <div class="item compact">
                  <div class="item-top">
                    <div class="item-url" x-text="t.name || t.test || 'unknown'"></div>
                    <span :class="badgeClass(t.outcome || t.status || 'unknown')" x-text="t.outcome || t.status || 'unknown'"></span>
                  </div>
                  <div x-show="t.message" class="meta"><span x-text="t.message || ''"></span></div>
                </div>
              </template>
            </template>
            <template x-for="t in testResults" :key="'ph-' + (t.name || '')">
              <template x-if="t._placeholder">
                <div class="item" x-text="t.name"></div>
              </template>
            </template>
          </div>
          <details class="mt-md" x-show="lastTestStdout">
            <summary class="text-muted text-sm cursor-pointer">stdout</summary>
            <div class="debug-box text-mono text-sm" x-text="lastTestStdout"></div>
          </details>
          <details class="mt-sm" x-show="lastTestStderr">
            <summary class="text-muted text-sm cursor-pointer">stderr</summary>
            <div class="debug-box text-mono text-sm" x-text="lastTestStderr"></div>
          </details>
        </div>
      </div>
