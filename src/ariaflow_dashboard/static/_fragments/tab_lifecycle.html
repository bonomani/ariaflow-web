      <!-- LIFECYCLE / SYSTEM HEALTH -->
      <div class="span-12" x-show="page === 'lifecycle' && healthIssues.length">
        <div class="panel">
          <div class="section-title">
            <h2><span :class="healthBadgeClass" x-text="healthBadgeText">Healthy</span></h2>
          </div>
          <div class="chips">
            <template x-for="issue in healthIssues" :key="issue.label">
              <div class="chip" :class="issue.level === 'bad' ? 'badge warn' : 'badge'" x-text="issue.label"></div>
            </template>
          </div>
        </div>
      </div>

      <div class="span-12" x-show="page === 'lifecycle'">
        <div class="panel">
          <div class="section-title">
            <h2>Components</h2>
          </div>
          <template x-if="!backendReachable && serverProbe && !serverProbe.installed && serverProbe.install_supported">
            <div class="banner mt-sm" role="region" aria-label="ariaflow-server not installed">
              <div class="meta">
                <span class="badge warn">not installed</span>
                <span>ariaflow-server isn't installed on this machine. The dashboard works against any backend, but the local one needs installing for full functionality.</span>
              </div>
              <div class="action-strip mt-sm">
                <button @click="installAriaflowServer()" :title="'brew/pipx install ariaflow-server (~30s)'">Install ariaflow-server (local)</button>
              </div>
            </div>
          </template>
          <template x-if="!backendReachable && serverProbe && !serverProbe.installed && !serverProbe.install_supported">
            <div class="banner mt-sm" role="region" aria-label="install not supported">
              <div class="meta text-muted">
                <span class="badge">manual install needed</span>
                <span>The dashboard was installed from source — install ariaflow-server yourself: <code>brew install bonomani/ariaflow/ariaflow-server</code></span>
              </div>
            </div>
          </template>
          <div class="list">
            <template x-for="row in lifecycleRows" :key="row.name">
              <div class="item">
                <div class="item-top">
                  <div class="item-url">
                    <span x-text="row.name"></span>
                    <template x-if="row.name === 'ariaflow-server'">
                      <strong class="text-muted text-sm" x-text="backendVersionText">-</strong>
                    </template>
                    <template x-if="row.name !== 'ariaflow-server' && row.record?.result?.version">
                      <strong class="text-muted text-sm" x-text="'v' + row.record.result.version"></strong>
                    </template>
                    <template x-if="row.name === 'ariaflow-server' && _serverUpdateProbe === 'available' && _serverLatestVersion">
                      <span class="badge warn" :title="'Latest in homebrew is v' + _serverLatestVersion + '. Click Update to upgrade.'" x-text="'→ v' + _serverLatestVersion"></span>
                    </template>
                  </div>
                  <span :class="(row.name === 'ariaflow-server' && _serverUpdateProbe === 'available') ? 'badge warn' : ((row.name === 'ariaflow-server' && serverHealthOverlay) ? 'badge warn' : lifecycleBadgeClass(row.record))"
                        :title="row.name === 'ariaflow-server' && serverHealthOverlay ? serverHealthOverlayText : ''"
                        x-text="(row.name === 'ariaflow-server' && _serverUpdateProbe === 'available') ? ('update available' + (row.record?.result?.managed_by || row.record?.result?.installed_via ? ' (' + [row.record.result.managed_by, row.record.result.installed_via].filter(Boolean).join(' · ') + ')' : '')) : ((row.name === 'ariaflow-server' && serverHealthOverlay) ? (lifecycleStateLabel(row.name, row.record) + ' · ' + serverHealthOverlayText) : lifecycleStateLabel(row.name, row.record))"></span>
                </div>
                <template x-if="row.name === 'ariaflow-server'">
                  <div>
                    <h4 class="text-sm text-muted mt-md mb-sm">Process</h4>
                    <div class="chips">
                      <div class="chip" x-show="backendPidText !== '-' && backendPidText !== 'unreported'">PID <strong x-text="backendPidText">-</strong></div>
                      <div class="chip">Uptime <strong x-text="healthUptimeText">-</strong></div>
                      <div class="chip">Requests <strong x-text="lastHealth?.requests_total ?? '-'">-</strong></div>
                      <div class="chip" :class="{ 'badge warn': lastHealth?.errors_total }">Errors <strong x-text="lastHealth?.errors_total ?? '-'">-</strong></div>
                      <div class="chip">SSE clients <strong x-text="lastHealth?.sse_clients ?? '-'">-</strong></div>
                      <div class="chip">Received <strong x-text="lastHealth?.bytes_received_total != null ? formatBytes(lastHealth.bytes_received_total) : '-'">-</strong></div>
                      <div class="chip">Sent <strong x-text="lastHealth?.bytes_sent_total != null ? formatBytes(lastHealth.bytes_sent_total) : '-'">-</strong></div>
                    </div>
                    <details class="mt-sm" x-show="lastHealth?.errors_recent?.length">
                      <summary class="text-muted text-sm cursor-pointer" x-text="'Recent errors (' + (lastHealth?.errors_recent?.length ?? 0) + ')'">Recent errors</summary>
                      <div class="list mt-sm">
                        <template x-for="(e, idx) in (lastHealth?.errors_recent || [])" :key="idx">
                          <div class="item compact">
                            <div class="item-top">
                              <span class="badge warn" x-text="e.status"></span>
                              <span class="text-mono text-sm" x-text="(e.method || '?') + ' ' + (e.path || '')"></span>
                              <span class="text-muted text-sm" x-text="e.at ? relativeTime(new Date(e.at * 1000).toISOString()) : ''"></span>
                            </div>
                          </div>
                        </template>
                      </div>
                    </details>
                    <div class="section-title mt-md">
                      <h4 class="text-sm text-muted">Scheduler</h4>
                      <span :class="schedulerBadgeClass" x-text="schedulerBadgeText + (schedulerWaitReasonText ? ' · ' + schedulerWaitReasonText : '')">stopped</span>
                    </div>
                    <div class="meta" x-show="schedulerActiveText">
                      <span x-text="schedulerActiveText"></span>
                    </div>
                    <div class="chips" x-show="_lifecycleSession">
                      <a href="#" class="chip"
                         x-show="_lifecycleSession?.session_id && _lifecycleSession?.session_started_at"
                         :title="_lifecycleSession?.session_id + ' — click to filter activity log to this run'"
                         @click.prevent="filterLogToCurrentSession()">
                        Run
                        <strong x-text="_lifecycleSession?.session_id ? _lifecycleSession.session_id.slice(0, 8) : '-'">-</strong>
                        <span class="text-muted" x-text="'· up ' + (_lifecycleSession?.session_started_at ? relativeTime(_lifecycleSession.session_started_at).replace(' ago', '') : '-')"></span>
                      </a>
                      <div class="chip" x-show="_lifecycleSession?.session_last_seen_at && !sessionTimestampStale(_lifecycleSession.session_last_seen_at)">Last seen <strong x-text="_lifecycleSession?.session_last_seen_at ? relativeTime(_lifecycleSession.session_last_seen_at) : '-'">-</strong></div>
                      <div class="chip" x-show="_lifecycleSession?.session_closed_at" :class="{ 'badge warn': _lifecycleSession?.session_closed_at }">Closed <strong x-text="_lifecycleSession?.session_closed_at ? relativeTime(_lifecycleSession.session_closed_at) + (_lifecycleSession.session_closed_reason ? ' · ' + _lifecycleSession.session_closed_reason : '') : '-'">-</strong></div>
                    </div>
                    <template x-if="schedulerWaitReasonAction">
                      <div class="action-strip mt-sm">
                        <button class="secondary" @click="runWaitReasonAction()" :disabled="!backendReachable" x-text="schedulerWaitReasonAction.label"></button>
                      </div>
                    </template>
                    <div>
                      <div class="section-title mt-md">
                        <h4 class="text-sm text-muted">Auto-update</h4>
                        <span :class="autoUpdateEnabled ? 'badge good' : 'badge'" x-text="autoUpdateEnabled ? 'enabled' : 'disabled'"></span>
                      </div>
                      <div class="meta">
                        <label :title="'Periodic upgrade check via the detected package manager (Homebrew, pipx, npm). Runs the same dispatcher as the manual Update button. Stored in declaration.preferences.auto_update.'">
                          <input type="checkbox" :checked="autoUpdateEnabled" @change="setAutoUpdate($el.checked)" :disabled="!backendReachable">
                          Enable periodic upgrade check
                        </label>
                      </div>
                      <div class="meta mt-sm" x-show="autoUpdateEnabled">
                        <label>
                          Check every
                          <input type="number" min="1" max="720" :value="autoUpdateCheckHours" @input="setAutoUpdateCheckHours($el.value)" class="input-sm" :disabled="!backendReachable">
                          hours
                        </label>
                      </div>
                      <div class="action-strip mt-sm">
                        <button class="secondary" @click="checkBackendUpdate()" :disabled="!backendReachable || updateCheckLoading" x-text="updateCheckLoading ? 'Checking…' : 'Check for update'"></button>
                        <span class="text-muted text-sm" x-show="updateCheckResult" x-text="updateCheckResult"></span>
                      </div>
                    </div>
                    <div class="action-strip mt-sm">
                      <button x-show="serverProbe && !serverProbe.installed && serverProbe.install_supported" @click="installAriaflowServer()" :title="'Local install via ' + (serverProbe?.installed_via || 'brew/pipx')">Install (local)</button>
                      <button x-show="serverProbe?.installed || backendReachable" @click="lifecycleAction('ariaflow-server', 'update')" :disabled="!backendReachable" :title="backendReachable ? 'Remote upgrade via backend (BG-46) → bootout+bootstrap (BG-62)' : 'Server unreachable — start it or use Install above'">Update</button>
                      <button class="secondary" x-show="serverProbe?.installed || backendReachable" @click="lifecycleAction('ariaflow-server', 'restart')" :disabled="!backendReachable" :title="'Remote restart via backend (BG-61)'">Restart</button>
                      <button class="secondary" x-show="serverProbe?.installed || backendReachable" @click="confirmUninstallServer()" :disabled="!backendReachable" :title="'Remote uninstall via backend'">Uninstall</button>
                    </div>
                  </div>
                </template>
                <template x-if="row.name !== 'ariaflow-server' && row.record?.result?.expected_version && row.record.result.version && row.record.result.version !== row.record.result.expected_version">
                  <div class="chips mt-sm">
                    <div class="chip badge warn">Expected <strong x-text="row.record.result.expected_version"></strong></div>
                  </div>
                </template>
                <template x-if="row.name === 'aria2' && row.record?.result?.auto_start">
                  <div>
                    <div class="section-title mt-md">
                      <h4 class="text-sm text-muted">Auto-start</h4>
                      <span :class="row.record.result.auto_start.installed ? 'badge good' : 'badge'" x-text="row.record.result.auto_start.installed ? 'loaded' : 'not loaded'"></span>
                    </div>
                    <div class="chips mt-sm" x-show="row.record.result.auto_start.target || row.record.result.auto_start.path">
                      <div class="chip" x-show="row.record.result.auto_start.target">Mechanism <strong x-text="row.record.result.auto_start.target"></strong></div>
                      <div class="chip text-mono text-sm" x-show="row.record.result.auto_start.path" :title="row.record.result.auto_start.path" x-text="row.record.result.auto_start.path"></div>
                    </div>
                    <div class="meta mt-sm" x-show="hasDeclarationPreference('auto_start_aria2')">
                      <label :title="'Backend reconciles the launchd / systemd plist on every boot to match this preference'">
                        <input type="checkbox" :checked="autoStartAria2Enabled" @change="setAutoStartAria2($el.checked)">
                        Keep auto-start loaded (reconcile on boot)
                      </label>
                    </div>
                    <div class="action-strip mt-sm" x-show="row.record.result.auto_start.target">
                      <button x-show="!row.record.result.auto_start.installed" @click="lifecycleAction('aria2-launchd', 'install')" :disabled="!backendReachable">Load</button>
                      <button x-show="row.record.result.auto_start.installed" class="secondary" @click="lifecycleAction('aria2-launchd', 'uninstall')" :disabled="!backendReachable">Unload</button>
                    </div>
                  </div>
                </template>
                <div class="meta" x-show="lifecycleItemLines(row.record)">
                  <span x-text="lifecycleItemLines(row.record)"></span>
                </div>
                <div x-show="row.actions.length" class="action-strip mt-sm">
                  <template x-for="act in row.actions" :key="act.target + act.action">
                    <button :class="{ secondary: !backendReachable }" @click="lifecycleAction(act.target, act.action)" x-text="act.label" :disabled="!backendReachable"></button>
                  </template>
                </div>
              </div>
            </template>
            <!-- ariaflow-dashboard self row — labeled chips, color = health -->
            <div class="item">
              <div class="item-top">
                <div class="item-url">
                  ariaflow-dashboard
                  <strong class="text-muted text-sm" x-text="webVersionText">-</strong>
                </div>
                <span :class="(webPidText !== '-' && webUptimeSeconds >= 30) ? 'badge good' : 'badge'"
                      :title="webUptimeSeconds < 30 ? 'Just restarted — settling' : 'Process up for ' + webUptimeText"
                      x-show="webPidText !== '-'">
                  PID <strong x-text="webPidText">-</strong>
                  · <strong x-text="webUptimeText"></strong>
                </span>
              </div>
              <div class="chips mt-sm">
                <span class="chip" x-show="webManagedBy">
                  Supervisor: <strong x-text="webManagedBy"></strong>
                </span>
                <span class="chip" x-show="webInstalledVia">
                  Package: <strong x-text="webInstalledVia"></strong>
                </span>
                <span :class="_dashUpdateProbe === 'available' || _dashUpdateProbe === 'failed' ? 'chip badge warn' : (_dashUpdateProbe === 'current' ? 'chip badge good' : 'chip')"
                      x-show="webInstalledVia"
                      :title="_dashUpdateProbe === null ? 'Click Check for update to verify' : updateCheckResultDash">
                  <template x-if="_dashUpdateProbe === 'failed'">
                    <span>Latest ⚠</span>
                  </template>
                  <template x-if="_dashUpdateProbe !== 'failed' && _dashLatestVersion">
                    <span>
                      Latest <strong x-text="'v' + _dashLatestVersion"></strong>
                      <strong x-text="_dashUpdateProbe === 'available' ? '↑' : '✓'"></strong>
                    </span>
                  </template>
                  <span x-show="_dashUpdateProbe !== 'failed' && !_dashLatestVersion" class="text-muted">Latest ?</span>
                </span>
                <button class="secondary text-sm" @click="checkDashUpdate()" :disabled="!webUpdateSupported || updateCheckLoading || dashLifecycleLoading" x-text="updateCheckLoading ? 'Checking…' : 'Check'"></button>
              </div>
              <div class="settings-grid mt-sm">
                <span class="settings-label">Auto-update</span>
                <span class="action-strip" style="justify-content:flex-end">
                  <template x-for="preset in [{l:'off',v:0},{l:'1h',v:1},{l:'6h',v:6},{l:'24h',v:24},{l:'1w',v:168}]" :key="preset.l">
                    <button class="text-sm"
                            :class="(preset.v === 0 ? !dashAutoUpdateEnabled : (dashAutoUpdateEnabled && Number(dashAutoUpdateCheckHours) === preset.v)) ? '' : 'secondary'"
                            @click="setDashAutoUpdatePreset(preset.v)"
                            x-text="preset.l"
                            :disabled="!webUpdateSupported"></button>
                  </template>
                </span>
                <span class="settings-label" x-show="dashAutoUpdateEnabled" :title="'Trigger an ariaflow-server upgrade just before the dashboard upgrades itself, so versions stay aligned.'">Also update ariaflow-server first</span>
                <span x-show="dashAutoUpdateEnabled" style="text-align:right">
                  <input type="checkbox" :checked="dashUpdateServerFirst" @change="setDashUpdateServerFirst($el.checked)">
                </span>
              </div>
              <div class="action-strip mt-sm">
                <button x-show="webRestartSupported" @click="webLifecycleAction('restart')" :disabled="dashLifecycleLoading" :title="'Restart via ' + webManagedBy" x-text="dashLifecycleLoading === 'restart' ? 'Restarting…' : 'Restart'"></button>
                <button x-show="webUpdateSupported" @click="webLifecycleAction('update')" :disabled="dashLifecycleLoading" :title="'Update via ' + webInstalledVia" x-text="dashLifecycleLoading === 'update' ? 'Updating…' : 'Update'"></button>
                <span class="text-muted text-sm" x-show="updateCheckResultDash && !dashLifecycleLoading" x-text="updateCheckResultDash"></span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Preflight — moved from Log tab; readiness gates fit System Health
           more cleanly than the contract-history surface. UCC stays on Log. -->
      <div class="span-12" x-show="page === 'lifecycle'" id="preflight-panel">
        <div class="panel">
          <div class="section-title">
            <h2>Preflight</h2>
            <div class="hint">Readiness gates — pass, warnings, and failures</div>
          </div>
          <div class="row mb-md">
            <button :class="{ secondary: !backendReachable, loading: preflightLoading }" @click="preflightRun()" :disabled="!backendReachable || preflightLoading" x-text="preflightLoading ? 'Running…' : 'Run preflight'">Run preflight</button>
          </div>
          <div class="list">
            <template x-if="!preflightData">
              <div class="item">Run preflight to see results.</div>
            </template>
            <template x-if="preflightData">
              <div>
                <template x-for="gate in (preflightData.gates || [])" :key="gate.name">
                  <div class="item">
                    <div class="item-top">
                      <div class="item-url" x-text="gate.name"></div>
                      <span :class="gate.satisfied ? 'badge good' : 'badge bad'" x-text="gate.satisfied ? 'ready' : 'blocked'"></span>
                    </div>
                    <div class="meta"><span x-text="(gate.class || 'gate') + ' · ' + (gate.blocking || 'unknown')"></span></div>
                  </div>
                </template>
                <template x-for="warning in (preflightData.warnings || [])" :key="warning.name">
                  <div class="item">
                    <div class="item-top">
                      <div class="item-url" x-text="warning.name"></div>
                      <span class="badge warn">warning</span>
                    </div>
                    <div class="meta"><span x-text="warning.message"></span></div>
                  </div>
                </template>
                <template x-for="(failure, idx) in (preflightData.hard_failures || [])" :key="'hf-' + idx">
                  <div class="item">
                    <div class="item-top">
                      <div class="item-url" x-text="failure"></div>
                      <span class="badge bad">blocked</span>
                    </div>
                  </div>
                </template>
              </div>
            </template>
          </div>
        </div>
      </div>
