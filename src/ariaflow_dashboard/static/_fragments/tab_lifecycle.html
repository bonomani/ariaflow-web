      <!-- LIFECYCLE / SYSTEM HEALTH -->
      <div class="span-12" x-show="page === 'lifecycle' && healthIssues.length">
        <div class="panel">
          <div class="section-title">
            <h2><span :class="healthBadgeClass" x-text="healthBadgeText">Healthy</span></h2>
          </div>
          <div class="chips">
            <template x-for="issue in healthIssues" :key="issue.label">
              <div class="chip" :class="issue.level === 'bad' ? 'badge warn' : 'badge'" x-text="issue.label"></div>
            </template>
          </div>
        </div>
      </div>

      <div class="span-12" x-show="page === 'lifecycle'">
        <div class="panel">
          <div class="section-title">
            <h2>Components</h2>
          </div>
          <div class="list">
            <template x-for="row in lifecycleRows" :key="row.name">
              <div class="item">
                <div class="item-top">
                  <div class="item-url">
                    <span x-text="row.name"></span>
                    <template x-if="row.name === 'ariaflow-server'">
                      <strong class="text-muted text-sm" x-text="backendVersionText">-</strong>
                    </template>
                  </div>
                  <span :class="lifecycleBadgeClass(row.record)" x-text="lifecycleStateLabel(row.name, row.record)"></span>
                </div>
                <template x-if="row.name === 'ariaflow-server'">
                  <div>
                    <h4 class="text-sm text-muted mt-md mb-sm">Process</h4>
                    <div class="chips">
                      <div class="chip" x-show="backendPidText !== '-' && backendPidText !== 'unreported'">PID <strong x-text="backendPidText">-</strong></div>
                      <div class="chip">Uptime <strong x-text="healthUptimeText">-</strong></div>
                      <div class="chip">Requests <strong x-text="lastHealth?.requests_total ?? '-'">-</strong></div>
                      <div class="chip" :class="{ 'badge warn': lastHealth?.errors_total }">Errors <strong x-text="lastHealth?.errors_total ?? '-'">-</strong></div>
                      <div class="chip">SSE clients <strong x-text="lastHealth?.sse_clients ?? '-'">-</strong></div>
                      <div class="chip">Received <strong x-text="lastHealth?.bytes_received_total != null ? formatBytes(lastHealth.bytes_received_total) : '-'">-</strong></div>
                      <div class="chip">Sent <strong x-text="lastHealth?.bytes_sent_total != null ? formatBytes(lastHealth.bytes_sent_total) : '-'">-</strong></div>
                    </div>
                    <details class="mt-sm" x-show="lastHealth?.errors_recent?.length">
                      <summary class="text-muted text-sm cursor-pointer" x-text="'Recent errors (' + (lastHealth?.errors_recent?.length ?? 0) + ')'">Recent errors</summary>
                      <div class="list mt-sm">
                        <template x-for="(e, idx) in (lastHealth?.errors_recent || [])" :key="idx">
                          <div class="item compact">
                            <div class="item-top">
                              <span class="badge warn" x-text="e.status"></span>
                              <span class="text-mono text-sm" x-text="(e.method || '?') + ' ' + (e.path || '')"></span>
                              <span class="text-muted text-sm" x-text="e.at ? relativeTime(new Date(e.at * 1000).toISOString()) : ''"></span>
                            </div>
                          </div>
                        </template>
                      </div>
                    </details>
                    <div class="section-title mt-md">
                      <h4 class="text-sm text-muted">Scheduler</h4>
                      <span :class="schedulerBadgeClass" x-text="schedulerBadgeText + (schedulerWaitReasonText ? ' · ' + schedulerWaitReasonText : '')">stopped</span>
                    </div>
                    <div class="meta" x-show="schedulerActiveText">
                      <span x-text="schedulerActiveText"></span>
                    </div>
                    <div class="chips" x-show="_lifecycleSession">
                      <div class="chip" x-show="_lifecycleSession?.session_id">Run <strong :title="_lifecycleSession?.session_id" x-text="_lifecycleSession?.session_id ? _lifecycleSession.session_id.slice(0, 8) : '-'">-</strong></div>
                      <div class="chip" x-show="_lifecycleSession?.session_started_at">Started <strong x-text="_lifecycleSession?.session_started_at ? relativeTime(_lifecycleSession.session_started_at) : '-'">-</strong></div>
                      <div class="chip" x-show="_lifecycleSession?.session_last_seen_at && !sessionTimestampStale(_lifecycleSession.session_last_seen_at)">Last seen <strong x-text="_lifecycleSession?.session_last_seen_at ? relativeTime(_lifecycleSession.session_last_seen_at) : '-'">-</strong></div>
                      <div class="chip" x-show="_lifecycleSession?.session_closed_at" :class="{ 'badge warn': _lifecycleSession?.session_closed_at }">Closed <strong x-text="_lifecycleSession?.session_closed_at ? relativeTime(_lifecycleSession.session_closed_at) + (_lifecycleSession.session_closed_reason ? ' · ' + _lifecycleSession.session_closed_reason : '') : '-'">-</strong></div>
                    </div>
                    <div class="action-strip mt-sm">
                      <button :class="{ secondary: !backendReachable }" @click="toggleScheduler()" :disabled="schedulerBtnDisabled" x-text="schedulerBtnText">Start</button>
                      <button class="secondary" @click="schedulerAction('stop')" :disabled="!backendReachable" x-show="schedulerBadgeText !== 'stopped' && schedulerBadgeText">Stop</button>
                      <template x-if="schedulerWaitReasonAction">
                        <button class="secondary" @click="runWaitReasonAction()" :disabled="!backendReachable" x-text="schedulerWaitReasonAction.label"></button>
                      </template>
                    </div>
                    <template x-if="hasDeclarationPreference('auto_update')">
                      <div>
                        <div class="section-title mt-md">
                          <h4 class="text-sm text-muted">Auto-update</h4>
                          <span :class="autoUpdateEnabled ? 'badge good' : 'badge'" x-text="autoUpdateEnabled ? 'enabled' : 'disabled'"></span>
                        </div>
                        <div class="meta">
                          <label :title="'Periodic upgrade check via the detected package manager (Homebrew, pipx, npm). Runs the same dispatcher as the manual Update button.'">
                            <input type="checkbox" :checked="autoUpdateEnabled" @change="setAutoUpdate($el.checked)">
                            Enable periodic upgrade check
                          </label>
                        </div>
                        <div class="meta mt-sm" x-show="autoUpdateEnabled && hasDeclarationPreference('auto_update_check_hours')">
                          <label>
                            Check every
                            <input type="number" min="1" max="720" :value="autoUpdateCheckHours" @input="setAutoUpdateCheckHours($el.value)" class="input-sm">
                            hours
                          </label>
                        </div>
                      </div>
                    </template>
                  </div>
                </template>
                <template x-if="row.name !== 'ariaflow-server' && row.record?.result && (row.record.result.version || row.record.result.managed_by || row.record.result.installed_via)">
                  <div class="chips mt-sm">
                    <div class="chip" x-show="row.record.result.version">Version <strong x-text="row.record.result.version"></strong></div>
                    <div class="chip badge warn" x-show="row.record.result.expected_version && row.record.result.version && row.record.result.version !== row.record.result.expected_version">Expected <strong x-text="row.record.result.expected_version"></strong></div>
                    <div class="chip" x-show="row.record.result.managed_by" :title="'Process supervisor (auto-start mechanism)'">Managed by <strong x-text="row.record.result.managed_by"></strong></div>
                    <div class="chip" x-show="row.record.result.installed_via" :title="'Package source (used for upgrades)'">Installed via <strong x-text="row.record.result.installed_via"></strong></div>
                  </div>
                </template>
                <template x-if="row.name === 'aria2' && row.record?.result?.auto_start">
                  <div>
                    <div class="section-title mt-md">
                      <h4 class="text-sm text-muted">Auto-start</h4>
                      <span :class="row.record.result.auto_start.installed ? 'badge good' : 'badge'" x-text="row.record.result.auto_start.installed ? 'loaded' : 'not loaded'"></span>
                    </div>
                    <div class="chips mt-sm" x-show="row.record.result.auto_start.target || row.record.result.auto_start.path">
                      <div class="chip" x-show="row.record.result.auto_start.target">Mechanism <strong x-text="row.record.result.auto_start.target"></strong></div>
                      <div class="chip text-mono text-sm" x-show="row.record.result.auto_start.path" :title="row.record.result.auto_start.path" x-text="row.record.result.auto_start.path"></div>
                    </div>
                    <div class="meta mt-sm" x-show="hasDeclarationPreference('auto_start_aria2')">
                      <label :title="'Backend reconciles the launchd / systemd plist on every boot to match this preference'">
                        <input type="checkbox" :checked="autoStartAria2Enabled" @change="setAutoStartAria2($el.checked)">
                        Keep auto-start loaded (reconcile on boot)
                      </label>
                    </div>
                    <div class="action-strip mt-sm" x-show="row.record.result.auto_start.target">
                      <button x-show="!row.record.result.auto_start.installed" @click="lifecycleAction('aria2-launchd', 'install')" :disabled="!backendReachable">Load</button>
                      <button x-show="row.record.result.auto_start.installed" class="secondary" @click="lifecycleAction('aria2-launchd', 'uninstall')" :disabled="!backendReachable">Unload</button>
                    </div>
                  </div>
                </template>
                <div class="meta" x-show="lifecycleItemLines(row.record)">
                  <span x-text="lifecycleItemLines(row.record)"></span>
                </div>
                <div x-show="row.actions.length" class="action-strip mt-sm">
                  <template x-for="act in row.actions" :key="act.target + act.action">
                    <button :class="{ secondary: !backendReachable }" @click="lifecycleAction(act.target, act.action)" x-text="act.label" :disabled="!backendReachable"></button>
                  </template>
                </div>
              </div>
            </template>
            <div class="item">
              <div class="item-top">
                <div class="item-url">
                  ariaflow-dashboard
                  <strong class="text-muted text-sm" x-text="webVersionText">-</strong>
                </div>
                <span class="badge good">running · current</span>
              </div>
              <div class="chips mt-sm" x-show="webPidText !== '-' || webManagedBy || webInstalledVia">
                <div class="chip" x-show="webPidText !== '-'">PID <strong x-text="webPidText">-</strong></div>
                <div class="chip" x-show="webManagedBy">Managed by <strong x-text="webManagedBy || 'unknown'"></strong></div>
                <div class="chip" x-show="webInstalledVia">Installed via <strong x-text="webInstalledVia || 'unknown'"></strong></div>
              </div>
              <div class="action-strip mt-sm" x-show="webManagedBy || webInstalledVia">
                <button x-show="webRestartSupported" @click="webLifecycleAction('restart')" :title="'Restart via ' + webManagedBy">Restart</button>
                <button x-show="webUpdateSupported" @click="webLifecycleAction('update')" :title="'Update via ' + webInstalledVia">Update</button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Preflight — moved from Log tab; readiness gates fit System Health
           more cleanly than the contract-history surface. UCC stays on Log. -->
      <div class="span-12" x-show="page === 'lifecycle'" id="preflight-panel">
        <div class="panel">
          <div class="section-title">
            <h2>Preflight</h2>
            <div class="hint">Readiness gates — pass, warnings, and failures</div>
          </div>
          <div class="row mb-md">
            <button :class="{ secondary: !backendReachable, loading: preflightLoading }" @click="preflightRun()" :disabled="!backendReachable || preflightLoading" x-text="preflightLoading ? 'Running…' : 'Run preflight'">Run preflight</button>
          </div>
          <div class="list">
            <template x-if="!preflightData">
              <div class="item">Run preflight to see results.</div>
            </template>
            <template x-if="preflightData">
              <div>
                <template x-for="gate in (preflightData.gates || [])" :key="gate.name">
                  <div class="item">
                    <div class="item-top">
                      <div class="item-url" x-text="gate.name"></div>
                      <span :class="gate.satisfied ? 'badge good' : 'badge bad'" x-text="gate.satisfied ? 'ready' : 'blocked'"></span>
                    </div>
                    <div class="meta"><span x-text="(gate.class || 'gate') + ' · ' + (gate.blocking || 'unknown')"></span></div>
                  </div>
                </template>
                <template x-for="warning in (preflightData.warnings || [])" :key="warning.name">
                  <div class="item">
                    <div class="item-top">
                      <div class="item-url" x-text="warning.name"></div>
                      <span class="badge warn">warning</span>
                    </div>
                    <div class="meta"><span x-text="warning.message"></span></div>
                  </div>
                </template>
                <template x-for="(failure, idx) in (preflightData.hard_failures || [])" :key="'hf-' + idx">
                  <div class="item">
                    <div class="item-top">
                      <div class="item-url" x-text="failure"></div>
                      <span class="badge bad">blocked</span>
                    </div>
                  </div>
                </template>
              </div>
            </template>
          </div>
        </div>
      </div>
