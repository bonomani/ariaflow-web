      <!-- LIFECYCLE -->
      <div class="span-6" x-show="page === 'lifecycle'">
        <div class="panel">
          <div class="section-title">
            <h2>Service Status</h2>
            <div class="hint">Component lifecycle: ariaflow, aria2, networkquality, launchd</div>
          </div>
          <div class="item mb-md">
            <div class="item-top">
              <div class="item-url">Update policy</div>
              <span class="badge">Homebrew tap</span>
            </div>
            <div class="meta"><span>Upgrades require Homebrew to install the new version and restart the service.</span></div>
          </div>
          <div class="list">
            <template x-if="_lifecycleSession">
              <div class="item mb-md">
                <div class="item-top">
                  <div class="item-url">Run</div>
                  <span class="badge" :class="{ warn: _lifecycleSession.session_closed_at, good: !_lifecycleSession.session_closed_at }" x-text="_lifecycleSession.session_closed_at ? 'closed' : 'current'"></span>
                </div>
                <div class="meta"><span x-text="_lifecycleSession.session_id"></span></div>
                <div class="meta">
                  <span x-text="_lifecycleSession.session_started_at ? 'Started ' + relativeTime(_lifecycleSession.session_started_at) : 'Start time unknown'"></span>
                  <span x-text="_lifecycleSession.session_last_seen_at ? 'Last seen ' + relativeTime(_lifecycleSession.session_last_seen_at) : 'Last seen unknown'"></span>
                  <span x-show="_lifecycleSession.session_closed_at" x-text="'Closed ' + (_lifecycleSession.session_closed_at ? relativeTime(_lifecycleSession.session_closed_at) : '') + (_lifecycleSession.session_closed_reason ? ' · ' + _lifecycleSession.session_closed_reason : '')"></span>
                </div>
              </div>
            </template>
            <template x-for="row in lifecycleRows" :key="row.name">
              <div class="item">
                <div class="item-top">
                  <div class="item-url" x-text="row.name"></div>
                  <span :class="badgeClass(lifecycleItemOutcome(row.record))" x-text="lifecycleStateLabel(row.name, row.record)"></span>
                </div>
                <div class="meta">
                  <span x-text="lifecycleItemLines(row.record)"></span>
                </div>
                <div x-show="row.actions.length" class="action-strip mt-sm">
                  <template x-for="act in row.actions" :key="act.target + act.action">
                    <button :class="{ secondary: !backendReachable }" @click="lifecycleAction(act.target, act.action)" x-text="act.label" :disabled="!backendReachable"></button>
                  </template>
                </div>
              </div>
            </template>
          </div>
        </div>
      </div>
