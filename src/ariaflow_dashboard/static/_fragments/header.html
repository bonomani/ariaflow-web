<body class="ws-app" x-data="ariaflow" :class="'page-' + page">
  <div class="wrap">
    <div class="nav">
      <a href="/" aria-label="Dashboard" :class="{ active: page === 'dashboard' }" @click.prevent="navigateTo('dashboard')">
        <span>Dashboard</span>
        <span x-show="sumQueued" aria-hidden="true" class="tab-badge" x-text="sumQueued"></span>
        <span x-show="sumError" aria-hidden="true" class="tab-badge warn" x-text="sumError"></span>
      </a>
      <a href="/bandwidth" :class="{ active: page === 'bandwidth' }" @click.prevent="navigateTo('bandwidth')">Bandwidth</a>
      <a href="/lifecycle" aria-label="System Health" :class="{ active: page === 'lifecycle' }" @click.prevent="navigateTo('lifecycle')">
        <span>System Health</span>
        <span x-show="lifecycleErrorCount" aria-hidden="true" class="tab-badge warn" x-text="lifecycleErrorCount"></span>
      </a>
      <a href="/options" :class="{ active: page === 'options' }" @click.prevent="navigateTo('options')">Options</a>
      <a href="/log" :class="{ active: page === 'log' }" @click.prevent="navigateTo('log')">Log</a>
      <a href="/dev" :class="{ active: page === 'dev' }" @click.prevent="navigateTo('dev')">Developer</a>
      <a href="/archive" aria-label="Archive" :class="{ active: page === 'archive' }" @click.prevent="navigateTo('archive')">
        <span>Archive</span>
        <span x-show="archivableCount" aria-hidden="true" class="tab-badge" :title="archivableCount + ' item(s) ready to archive'" x-text="archivableCount"></span>
      </a>
      <div class="spacer"></div>
      <label class="refresh-control" for="refresh-interval">
        Refresh
        <select id="refresh-interval" :value="refreshInterval" @change="setRefreshInterval($el.value)">
          <option value="1500">1.5s</option>
          <option value="3000">3s</option>
          <option value="5000">5s</option>
          <option value="10000">10s</option>
          <option value="30000">30s</option>
          <option value="0">Off</option>
        </select>
      </label>
      <button class="secondary" @click="toggleTheme()" x-text="themeLabel">Theme</button>
    </div>
    <!-- Hero v2 — ambitious redesign.
         Layout:
           Row 1: brand (logo + name + version) on left, status pills on right.
           Row 2: KPI strip — Speed, Items, Cap headroom — three tiles.
           Row 3: full-width chart timeline.
           Row 4: collapsed Details (session, disk, interfaces, backend admin). -->
    <div class="hero hero-v2">
      <div class="hero-bg" aria-hidden="true">
        <div x-html="globalTimelineSvg" class="hero-bg-chart"></div>
      </div>

      <div class="hero-row hero-brand-row">
        <div class="hero-brand">
          <svg class="hero-brand-mark" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M16 4 V20 M9 14 L16 21 L23 14"/>
            <path d="M4 26 Q9 22 14 26 T24 26 T34 26" stroke-width="1.6" opacity="0.65"/>
          </svg>
          <h1>ariaflow</h1>
          <span class="hero-brand-version text-muted" x-text="webVersionText"></span>
        </div>
        <div class="hero-pills">
          <label class="pill pill-select" :title="selectedBackend">
            <span class="status-dot" :class="backendReachable ? 'good' : 'bad'"></span>
            <select :value="selectedBackend" @change="selectBackend($el.value)">
              <option :value="DEFAULT_BACKEND_URL" x-text="backendDisplayName(DEFAULT_BACKEND_URL)"></option>
              <template x-for="backend in backends" :key="backend">
                <option :value="backend" x-text="backendDisplayName(backend)"></option>
              </template>
            </select>
          </label>
          <a class="pill" href="/lifecycle" @click.prevent="navigateTo('lifecycle')" :title="healthIssues.length ? 'Open System Health' : 'All systems nominal'">
            <span class="status-dot" :class="healthIssues.length ? (healthIssues.some(i => i.level === 'bad') ? 'bad' : 'warn') : 'good'"></span>
            <span x-text="healthBadgeText">Healthy</span>
          </a>
          <span class="pill" :title="bonjourBadgeTitle">
            <span class="status-dot" :class="bonjourState === 'broken' ? 'warn' : (bonjourState === 'ok' ? 'good' : 'muted')"></span>
            <span x-text="bonjourBadgeText">mDNS</span>
          </span>
        </div>
      </div>

      <div class="hero-row hero-kpis">
        <div class="kpi kpi-speed">
          <div class="kpi-label">Throughput</div>
          <div class="kpi-value" x-text="transferSpeedText">idle</div>
          <div class="kpi-sub" x-show="currentTransfer" x-text="currentTransferName"></div>
        </div>
        <div class="kpi kpi-items">
          <div class="kpi-label">Queue</div>
          <template x-if="(filterCounts.active || 0) + (sumQueued || 0) + (sumDone || 0) === 0">
            <div>
              <div class="kpi-value text-muted">empty</div>
              <div class="kpi-sub">no items</div>
            </div>
          </template>
          <template x-if="(filterCounts.active || 0) + (sumQueued || 0) + (sumDone || 0) > 0">
            <div>
              <div class="kpi-value">
                <span x-text="filterCounts.active || 0"></span>
                <span class="kpi-unit">active</span>
              </div>
              <div class="kpi-sub">
                <span x-show="sumQueued"><span x-text="sumQueued"></span> queued</span>
                <span x-show="sumQueued && sumDone"> · </span>
                <span x-show="sumDone"><span x-text="sumDone"></span> done</span>
              </div>
            </div>
          </template>
        </div>
        <div class="kpi kpi-cap" x-show="bw.cap_mbps">
          <div class="kpi-label">Cap</div>
          <div class="kpi-value">
            <span x-show="bwLiveDownMbps > 0" :class="{ 'kpi-over': bwOverCap }" x-text="bwUtilizationPct + '%'"></span>
            <span x-show="bwLiveDownMbps <= 0" class="text-muted" x-text="bw.cap_mbps.toFixed(1) + ' Mbps'"></span>
          </div>
          <div class="kpi-sub" x-show="bwLiveDownMbps > 0" x-text="bwLiveDownMbps.toFixed(1) + ' / ' + bw.cap_mbps.toFixed(1) + ' Mbps' + (bwOverCap ? ' · over' : '')"></div>
          <div class="kpi-sub" x-show="bwLiveDownMbps <= 0">headroom available</div>
        </div>
        <div class="kpi kpi-cap" x-show="!bw.cap_mbps">
          <div class="kpi-label">Cap</div>
          <div class="kpi-value text-muted">unset</div>
          <div class="kpi-sub">no bandwidth limit configured</div>
        </div>
      </div>

      <details class="hero-details">
        <summary class="text-muted text-sm cursor-pointer">Details</summary>
        <div class="hero-details-body">
          <div class="chips">
            <a class="chip-details" href="/lifecycle" @click.prevent="navigateTo('lifecycle')" :title="'Session ' + sessionIdShort(state)">
              <span class="chip">Session <strong x-text="sessionIdText + (sessionStartedText !== '-' ? ' · ' + sessionStartedText : '')">-</strong></span>
            </a>
            <div class="chip" :class="{ 'badge warn': !diskOk }" x-show="diskUsageText !== '-'">Disk <strong x-text="diskUsageText">-</strong></div>
            <template x-for="ip in localIps" :key="ip">
              <div class="chip" :class="{ 'badge good': ip === localMainIp }">
                <span x-text="ip"></span>
                <strong x-show="ip === localMainIp" x-text="'main'"></strong>
              </div>
            </template>
          </div>
          <div class="gap-sm mt-sm">
            <input type="url" x-model="backendInput" placeholder="Add backend URL" class="input-md" @keydown.enter="addBackend()">
            <button x-show="backendInput.trim()" @click="addBackend()">Add</button>
            <button x-show="selectedBackend !== DEFAULT_BACKEND_URL" class="secondary" @click="removeBackend(selectedBackend)" title="Remove current backend">Remove current</button>
          </div>
        </div>
      </details>
    </div>
