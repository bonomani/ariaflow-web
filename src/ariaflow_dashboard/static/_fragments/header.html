<body class="ws-app" x-data="ariaflow" :class="'page-' + page">
  <div class="wrap">
    <div class="nav">
      <a href="/" aria-label="Dashboard" :class="{ active: page === 'dashboard' }" @click.prevent="navigateTo('dashboard')">
        <span>Dashboard</span>
        <span x-show="sumQueued" aria-hidden="true" class="tab-badge" x-text="sumQueued"></span>
        <span x-show="sumError" aria-hidden="true" class="tab-badge warn" x-text="sumError"></span>
      </a>
      <a href="/bandwidth" :class="{ active: page === 'bandwidth' }" @click.prevent="navigateTo('bandwidth')">Bandwidth</a>
      <a href="/lifecycle" aria-label="System Health" :class="{ active: page === 'lifecycle' }" @click.prevent="navigateTo('lifecycle')">
        <span>System Health</span>
        <span x-show="lifecycleErrorCount" aria-hidden="true" class="tab-badge warn" x-text="lifecycleErrorCount"></span>
      </a>
      <a href="/options" :class="{ active: page === 'options' }" @click.prevent="navigateTo('options')">Options</a>
      <a href="/log" :class="{ active: page === 'log' }" @click.prevent="navigateTo('log')">Log</a>
      <a href="/dev" :class="{ active: page === 'dev' }" @click.prevent="navigateTo('dev')">Developer</a>
      <a href="/archive" aria-label="Archive" :class="{ active: page === 'archive' }" @click.prevent="navigateTo('archive')">
        <span>Archive</span>
        <span x-show="archivableCount" aria-hidden="true" class="tab-badge" :title="archivableCount + ' item(s) ready to archive'" x-text="archivableCount"></span>
      </a>
      <div class="spacer"></div>
      <label class="refresh-control" for="refresh-interval">
        Refresh
        <select id="refresh-interval" :value="refreshInterval" @change="setRefreshInterval($el.value)">
          <option value="1500">1.5s</option>
          <option value="3000">3s</option>
          <option value="5000">5s</option>
          <option value="10000">10s</option>
          <option value="30000">30s</option>
          <option value="0">Off</option>
        </select>
      </label>
      <button class="secondary" @click="toggleTheme()" x-text="themeLabel">Theme</button>
    </div>
    <!-- Hero: Option A — single column flow.
         Top: brand left, status chips right.
         Middle: speed + item name on one line, sparkline directly below.
         Cap utilization bar adjacent to speed (same visual question).
         Footer: session/disk + collapsible Local interfaces + add-backend. -->
    <div class="hero hero-flow">
      <div class="hero-top">
        <h1>ariaflow-dashboard</h1>
        <div class="chips hero-status">
          <label class="chip" :title="selectedBackend">
            Backend
            <select :value="selectedBackend" @change="selectBackend($el.value)">
              <option :value="DEFAULT_BACKEND_URL" x-text="backendDisplayName(DEFAULT_BACKEND_URL)"></option>
              <template x-for="backend in backends" :key="backend">
                <option :value="backend" x-text="backendDisplayName(backend)"></option>
              </template>
            </select>
          </label>
          <a class="chip-details" href="/lifecycle" @click.prevent="navigateTo('lifecycle')" :title="healthIssues.length ? 'Open System Health' : ''">
            <span :class="healthBadgeClass" x-text="healthBadgeText">Healthy</span>
          </a>
          <div class="chip" :class="bonjourBadgeClass" :title="bonjourBadgeTitle" x-text="bonjourBadgeText">mDNS</div>
        </div>
      </div>

      <div class="hero-transfer">
        <div class="stat-value" x-text="transferSpeedText">idle</div>
        <div class="stat-sub" x-show="currentTransfer" x-text="currentTransferName"></div>
        <div x-html="globalSparklineSvg" class="mt-sm"></div>
      </div>

      <div class="hero-cap mt-sm" x-show="bw.cap_mbps">
        <div class="meta"><span>Cap utilization <strong x-text="bwUtilizationPct + '%'"></strong> · <span x-text="bwUtilizationText"></span></span></div>
        <div class="meter"><div :style="'width:' + bwUtilizationPct + '%'"></div></div>
      </div>

      <div class="hero-footer mt-md">
        <div class="chips">
          <a class="chip-details" href="/lifecycle" @click.prevent="navigateTo('lifecycle')" title="Open System Health">
            <span class="chip">Session <strong x-text="sessionIdText + (sessionStartedText !== '-' ? ' · ' + sessionStartedText : '')">-</strong></span>
          </a>
          <div class="chip" :class="{ 'badge warn': !diskOk }" x-show="diskUsageText !== '-'">Disk <strong x-text="diskUsageText">-</strong></div>
          <details class="chip-details">
            <summary class="text-muted text-sm cursor-pointer">Local interfaces</summary>
            <div class="chips mt-sm">
              <template x-for="ip in localIps" :key="ip">
                <div class="chip" :class="{ 'badge good': ip === localMainIp }">
                  <span x-text="ip"></span>
                  <strong x-show="ip === localMainIp" x-text="'main'"></strong>
                </div>
              </template>
            </div>
          </details>
        </div>
        <div class="gap-sm mt-sm">
          <input type="url" x-model="backendInput" placeholder="Add backend URL" class="input-md" @keydown.enter="addBackend()">
          <button x-show="backendInput.trim()" @click="addBackend()">Add</button>
          <button x-show="selectedBackend !== DEFAULT_BACKEND_URL" class="secondary" @click="removeBackend(selectedBackend)" title="Remove current backend">Remove current</button>
        </div>
      </div>
    </div>
