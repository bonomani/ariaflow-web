      <!-- DOWNLOADED -->
      <div class="span-12" x-show="page === 'archive'">
        <div class="panel">
          <div class="section-title">
            <h2>Downloaded</h2>
            <div class="hint">
              <span x-text="filesData.length + ' file(s) in folder · ' + formatBytes(filesTotalSize)"></span>
            </div>
            <div class="action-strip">
              <button class="secondary" @click="openCleanModal()" :disabled="!backendReachable">Clean…</button>
            </div>
          </div>
          <div class="list">
            <template x-if="filesRows.length === 0 && filesError === 'download_dir_unset'">
              <div class="item">
                <span>Download folder not configured.</span>
                <a href="#" @click.prevent="navigateTo('options')">Set <code>download_dir</code> in Options</a>
              </div>
            </template>
            <template x-if="filesRows.length === 0 && filesError && filesError !== 'download_dir_unset'">
              <div class="item">Couldn't read download folder (<span x-text="filesError"></span>). Check Options.</div>
            </template>
            <template x-if="filesRows.length === 0 && !filesError">
              <div class="item">Download folder is empty.</div>
            </template>
            <template x-for="row in filesRows" :key="(row.file?.path || row.history?.id)">
              <div class="item compact">
                <!-- Row variant: on disk + ariaflow history -->
                <template x-if="row.kind === 'on_disk_history'">
                  <div>
                    <div class="item-top">
                      <div class="item-url" x-text="row.file.rel_path"></div>
                      <span class="badge" x-show="row.file.type !== 'directory'" x-text="formatBytes(row.file.size)"></span>
                      <span class="badge" x-show="row.file.type === 'directory'">folder</span>
                    </div>
                    <div class="meta">
                      <span x-show="row.history?.downloaded_at" x-text="'Downloaded ' + relativeTime(row.history.downloaded_at)"></span>
                      <span class="url-truncate text-muted" x-show="row.history?.url" :title="row.history.url" x-text="row.history.url"></span>
                    </div>
                    <div class="action-strip mt-sm">
                      <button class="secondary" @click="renameFile(row.file.path, row.file.rel_path)">Rename</button>
                      <button class="secondary" @click="moveFile(row.file.path, row.file.rel_path)">Move</button>
                      <button class="secondary" @click="deleteFile(row.file.path, row.file.rel_path, row.file.type === 'directory')">Delete</button>
                    </div>
                  </div>
                </template>
                <!-- Row variant: on disk, no ariaflow history -->
                <template x-if="row.kind === 'on_disk_orphan'">
                  <div>
                    <div class="item-top">
                      <div class="item-url" x-text="row.file.rel_path"></div>
                      <span class="badge" x-show="row.file.type !== 'directory'" x-text="formatBytes(row.file.size)"></span>
                      <span class="badge" x-show="row.file.type === 'directory'">folder</span>
                      <span class="badge text-muted" title="File present in folder, never downloaded by ariaflow">orphan</span>
                    </div>
                    <div class="meta">
                      <span x-show="row.file.modified_at" x-text="'Modified ' + relativeTime(row.file.modified_at)"></span>
                      <span class="text-muted">Source unknown — found in folder, not in ariaflow history.</span>
                    </div>
                    <div class="action-strip mt-sm">
                      <button class="secondary" @click="renameFile(row.file.path, row.file.rel_path)">Rename</button>
                      <button class="secondary" @click="moveFile(row.file.path, row.file.rel_path)">Move</button>
                      <button class="secondary" @click="deleteFile(row.file.path, row.file.rel_path, row.file.type === 'directory')">Delete</button>
                    </div>
                  </div>
                </template>
                <!-- Row variant: in history but missing from disk -->
                <template x-if="row.kind === 'history_missing_disk'">
                  <div>
                    <div class="item-top">
                      <div class="item-url" x-text="shortName(row.history.output_path || row.history.url || '(no name)')"></div>
                      <span class="badge warn">missing</span>
                    </div>
                    <div class="meta">
                      <span x-show="row.history?.completed_at" x-text="'Downloaded ' + relativeTime(row.history.completed_at) + ' — file no longer on disk'"></span>
                      <span class="url-truncate text-muted" x-show="row.history?.url" :title="row.history.url" x-text="row.history.url"></span>
                    </div>
                  </div>
                </template>
              </div>
            </template>
          </div>
        </div>
      </div>

      <!-- Clean modal -->
      <template x-if="cleanModalOpen">
        <div class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="clean-modal-heading">
          <div class="modal panel">
            <h3 id="clean-modal-heading">Clean downloads</h3>
            <div class="meta">
              <label>
                <input type="radio" x-model="cleanForm.recipe" value="complete_older_than">
                Delete completed downloads older than
                <input type="number" min="1" x-model="cleanForm.older_than_days" style="width:5em" :disabled="cleanForm.recipe !== 'complete_older_than'">
                days
              </label>
            </div>
            <div class="meta">
              <label><input type="radio" x-model="cleanForm.recipe" value="errors"> Delete files for errored downloads</label>
            </div>
            <div class="meta">
              <label><input type="radio" x-model="cleanForm.recipe" value="orphaned"> Forget history rows where the file is gone (no disk effect)</label>
            </div>
            <div class="action-strip mt-md">
              <button @click="runCleanRecipe()">Run</button>
              <button class="secondary" @click="closeCleanModal()">Cancel</button>
            </div>
          </div>
        </div>
      </template>
