      <!-- UCC contract trace -->
      <div class="span-6" x-show="page === 'log'">
        <div class="panel">
          <div class="section-title">
            <h2>UCC</h2>
            <div class="hint">Contract execution trace</div>
          </div>
          <div class="row mb-md">
            <button :class="{ secondary: !backendReachable, loading: uccLoading }" @click="uccRun()" :disabled="!backendReachable || uccLoading" x-text="uccLoading ? 'Running…' : 'Run UCC'">Run UCC</button>
          </div>
          <div class="list">
            <template x-if="contractTraceItems">
              <div class="item">
                <div class="item-top">
                  <div class="item-url" x-text="(contractTraceItems.meta?.contract || 'UCC') + ' v' + (contractTraceItems.meta?.version || '-')"></div>
                  <span :class="badgeClass(contractTraceOutcome())" x-text="contractTraceOutcome()"></span>
                </div>
                <div class="system-facts">
                  <div class="system-fact" x-show="contractTraceItems.result?.message"><span>Message</span><strong x-text="contractTraceItems.result?.message"></strong></div>
                  <div class="system-fact" x-show="contractTraceItems.result?.reason"><span>Reason</span><strong x-text="contractTraceItems.result?.reason"></strong></div>
                  <div class="system-fact" x-show="contractTraceItems.preflight?.status"><span>Preflight</span><strong x-text="contractTraceItems.preflight?.status"></strong></div>
                </div>
              </div>
            </template>
            <template x-if="!contractTraceItems">
              <div class="text-muted text-sm">Run UCC to see results</div>
            </template>
          </div>
          <details class="debug mt-md" x-show="resultJson && resultJson !== 'Idle'">
            <summary class="text-muted text-sm cursor-pointer">Raw JSON</summary>
            <div class="debug-box" x-text="resultJson"></div>
          </details>
        </div>
      </div>

      <!-- Activity: merged backend + dashboard event log -->
      <div class="span-6" x-show="page === 'log'">
        <div class="panel">
          <div class="section-title">
            <h2>Activity</h2>
            <div class="hint">Backend + dashboard events, merged chronologically</div>
          </div>
          <!-- Filters. Filtering is purely client-side via the
               filteredActionLog getter, so @change handlers aren't
               needed — Alpine re-runs the getter when x-model fires. -->
          <div class="row mb-sm">
            <label class="text-muted text-sm">Source
              <select x-model="sourceFilter">
                <option value="all">All</option>
                <option value="server">Server</option>
                <option value="dashboard">Dashboard</option>
              </select>
            </label>
            <label class="text-muted text-sm">Action
              <select x-model="actionFilter">
                <option value="all">All</option>
                <template x-for="a in availableActions" :key="a">
                  <option :value="a" x-text="a"></option>
                </template>
              </select>
            </label>
            <label class="text-muted text-sm">Target
              <select x-model="targetFilter">
                <option value="all">All</option>
                <template x-for="t in availableTargets" :key="t">
                  <option :value="t" x-text="t"></option>
                </template>
              </select>
            </label>
            <label class="text-muted text-sm">Session
              <select x-model="sessionFilter">
                <option value="all">All</option>
                <option value="current">Current run</option>
              </select>
            </label>
          </div>
          <!-- logLimit controls /api/log?limit=N — needs a refetch. -->
          <div class="row mb-md">
            <label class="text-muted text-sm">Show
              <select x-model="logLimit" @change="refreshActionLog()">
                <option value="50">50</option>
                <option value="120">120</option>
                <option value="250">250</option>
                <option value="500">500</option>
              </select>
              entries
            </label>
          </div>
          <div class="list">
            <template x-if="filteredActionLog.length === 0">
              <div class="item">No activity entries.</div>
            </template>
            <template x-for="entry in filteredActionLog" :key="(entry._source || '') + entry.timestamp + (entry.action || '') + (entry.target || '')">
              <div class="item compact log-row">
                <div class="item-top log-row-top">
                  <span class="log-time text-muted text-mono text-sm" :title="entry.timestamp || ''" x-text="entry.timestamp ? relativeTime(entry.timestamp) : '-'"></span>
                  <span class="log-phrase">
                    <strong x-text="entry.action || 'event'"></strong>
                    <span class="text-muted" x-show="entry.target" x-text="entry.target"></span>
                    <span class="text-muted" x-show="logEntryDetail(entry)" x-text="'— ' + logEntryDetail(entry)"></span>
                  </span>
                  <span class="log-badges">
                    <span class="badge" :class="entry._source === 'dashboard' ? '' : 'good'" x-text="entry._source"></span>
                    <span :class="badgeClass(entry.outcome || entry.status || 'unknown')" x-text="entry.outcome || entry.status || 'unknown'"></span>
                    <span x-show="entry.observation && entry.observation !== 'ok'" class="badge warn" x-text="entry.observation"></span>
                  </span>
                </div>
              </div>
            </template>
          </div>
        </div>
      </div>
