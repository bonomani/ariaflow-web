      <!-- UCC contract trace -->
      <div class="span-6" x-show="page === 'log'">
        <div class="panel">
          <div class="section-title">
            <h2>UCC</h2>
            <div class="hint">Contract execution trace</div>
          </div>
          <div class="row mb-md">
            <button :class="{ secondary: !backendReachable, loading: uccLoading }" @click="uccRun()" :disabled="!backendReachable || uccLoading" x-text="uccLoading ? 'Running…' : 'Run UCC'">Run UCC</button>
          </div>
          <div class="list">
            <template x-if="contractTraceItems">
              <div class="item">
                <div class="item-top">
                  <div class="item-url" x-text="(contractTraceItems.meta?.contract || 'UCC') + ' v' + (contractTraceItems.meta?.version || '-')"></div>
                  <span :class="badgeClass(contractTraceOutcome())" x-text="contractTraceOutcome()"></span>
                </div>
                <div class="system-facts">
                  <div class="system-fact" x-show="contractTraceItems.result?.message"><span>Message</span><strong x-text="contractTraceItems.result?.message"></strong></div>
                  <div class="system-fact" x-show="contractTraceItems.result?.reason"><span>Reason</span><strong x-text="contractTraceItems.result?.reason"></strong></div>
                  <div class="system-fact" x-show="contractTraceItems.preflight?.status"><span>Preflight</span><strong x-text="contractTraceItems.preflight?.status"></strong></div>
                </div>
              </div>
            </template>
            <template x-if="!contractTraceItems">
              <div class="text-muted text-sm">Run UCC to see results</div>
            </template>
          </div>
          <details class="debug mt-md" x-show="resultJson && resultJson !== 'Idle'">
            <summary class="text-muted text-sm cursor-pointer">Raw JSON</summary>
            <div class="debug-box" x-text="resultJson"></div>
          </details>
        </div>
      </div>

      <!-- Preflight: gates / warnings / failures -->
      <div class="span-6" x-show="page === 'log'">
        <div class="panel">
          <div class="section-title">
            <h2>Preflight</h2>
            <div class="hint">Pass, warnings, and failures</div>
          </div>
          <div class="row mb-md">
            <button :class="{ secondary: !backendReachable, loading: preflightLoading }" @click="preflightRun()" :disabled="!backendReachable || preflightLoading" x-text="preflightLoading ? 'Running…' : 'Run preflight'">Run preflight</button>
          </div>
          <div class="list">
            <template x-if="preflightData">
              <div>
                <template x-for="gate in (preflightData.gates || [])" :key="gate.name">
                  <div class="item">
                    <div class="item-top">
                      <div class="item-url" x-text="gate.name"></div>
                      <span :class="gate.satisfied ? 'badge good' : 'badge bad'" x-text="gate.satisfied ? 'ready' : 'blocked'"></span>
                    </div>
                    <div class="meta"><span x-text="(gate.class || 'gate') + ' · ' + (gate.blocking || 'unknown')"></span></div>
                  </div>
                </template>
                <template x-for="warning in (preflightData.warnings || [])" :key="warning.name">
                  <div class="item">
                    <div class="item-top">
                      <div class="item-url" x-text="warning.name"></div>
                      <span class="badge warn">warning</span>
                    </div>
                    <div class="meta"><span x-text="warning.message"></span></div>
                  </div>
                </template>
                <template x-for="(failure, idx) in (preflightData.hard_failures || [])" :key="'hf-' + idx">
                  <div class="item">
                    <div class="item-top">
                      <div class="item-url" x-text="failure"></div>
                      <span class="badge bad">blocked</span>
                    </div>
                  </div>
                </template>
              </div>
            </template>
            <template x-if="!preflightData">
              <div class="text-muted text-sm">Run preflight to see results</div>
            </template>
          </div>
        </div>
      </div>
      <div class="span-6" x-show="page === 'log'">
        <div class="panel">
          <div class="section-title">
            <h2>Action History</h2>
            <div class="hint">Normalized event log</div>
          </div>
          <!-- Filters: what to show. -->
          <div class="row mb-sm">
            <label class="text-muted text-sm">Action
              <select x-model="actionFilter" @change="refreshActionLog()">
                <option value="all">All</option>
                <template x-for="a in availableActions" :key="a">
                  <option :value="a" x-text="a"></option>
                </template>
              </select>
            </label>
            <label class="text-muted text-sm">Target
              <select x-model="targetFilter" @change="refreshActionLog()">
                <option value="all">All</option>
                <template x-for="t in availableTargets" :key="t">
                  <option :value="t" x-text="t"></option>
                </template>
              </select>
            </label>
            <label class="text-muted text-sm">Session
              <select x-model="sessionFilter" @change="refreshActionLog()">
                <option value="all">All</option>
                <option value="current">Current run</option>
              </select>
            </label>
          </div>
          <!-- Display preference: how many to show. -->
          <div class="row mb-md">
            <label class="text-muted text-sm">Show
              <select x-model="logLimit" @change="refreshActionLog()">
                <option value="50">50</option>
                <option value="120">120</option>
                <option value="250">250</option>
                <option value="500">500</option>
              </select>
              entries
            </label>
          </div>
          <div class="list">
            <template x-if="filteredActionLog.length === 0">
              <div class="item">No action log yet.</div>
            </template>
            <template x-for="entry in filteredActionLog" :key="entry.timestamp + (entry.action || '') + (entry.target || '')">
              <div class="item">
                <div class="item-top">
                  <div class="item-url" x-text="entry.action || 'event'"></div>
                  <span :class="badgeClass(entry.outcome || entry.status || 'unknown')" x-text="entry.outcome || entry.status || 'unknown'"></span>
                  <span x-show="entry.observation && entry.observation !== 'ok'" class="badge warn" x-text="entry.observation"></span>
                </div>
                <div class="meta"><span x-text="(entry.action === 'poll' ? 'Historical event' : 'Historical record') + ' · ' + logEntryLines(entry)"></span></div>
              </div>
            </template>
          </div>
        </div>
      </div>
<div class="span-6" x-show="page === 'log'">
        <div class="panel">
          <div class="section-title">
            <h2>Session History</h2>
            <div class="hint">Past sessions from this backend</div>
          </div>
          <div class="queue-list">
            <template x-for="session in sessionHistory" :key="session.session_id">
              <div class="queue-item cursor-pointer" @click="loadSessionStats(session.session_id)">
                <div class="queue-item-header">
                  <span class="badge" :class="session.session_closed_at ? 'warn' : 'good'" x-text="session.session_closed_at ? 'closed' : 'active'"></span>
                  <strong x-text="session.session_id ? session.session_id.slice(0, 8) : '-'"></strong>
                </div>
                <div class="queue-item-detail" x-text="(session.session_started_at ? 'Started ' + relativeTime(session.session_started_at) : '') + (session.session_closed_at ? ' · Closed ' + relativeTime(session.session_closed_at) : '') + (session.items_total != null ? ' · ' + session.items_total + ' items' : '') + (session.items_done ? ', ' + session.items_done + ' done' : '') + (session.items_error ? ', ' + session.items_error + ' errors' : '')"></div>
                <template x-if="selectedSessionId === session.session_id && selectedSessionStats">
                  <div class="queue-item-detail mt-sm">
                    <template x-if="selectedSessionStats.error">
                      <span x-text="selectedSessionStats.error"></span>
                    </template>
                    <template x-if="!selectedSessionStats.error">
                      <span x-text="(selectedSessionStats.items_total != null ? selectedSessionStats.items_total + ' total' : '') + (selectedSessionStats.items_done ? ', ' + selectedSessionStats.items_done + ' done' : '') + (selectedSessionStats.items_error ? ', ' + selectedSessionStats.items_error + ' errors' : '') + (selectedSessionStats.items_queued ? ', ' + selectedSessionStats.items_queued + ' queued' : '') + (selectedSessionStats.items_active ? ', ' + selectedSessionStats.items_active + ' active' : '') + (selectedSessionStats.bytes_completed ? ' · ' + formatBytes(selectedSessionStats.bytes_completed) : '')"></span>
                    </template>
                  </div>
                </template>
              </div>
            </template>
            <div x-show="!sessionHistory.length" class="text-muted">No session history available</div>
          </div>
        </div>
      </div>

      <div class="span-12" x-show="page === 'log'">
        <div class="panel">
          <div class="section-title">
            <h2>Web Server Log</h2>
            <button @click="loadWebLog()">Refresh</button>
          </div>
          <div class="list">
            <template x-if="webLogEntries.length === 0">
              <div class="text-muted text-sm">No web server log entries.</div>
            </template>
            <template x-for="entry in webLogEntries" :key="entry.timestamp + (entry.action || '')">
              <div class="item">
                <div class="item-top">
                  <div class="item-url" x-text="entry.action || 'event'"></div>
                  <span :class="badgeClass(entry.outcome || 'unknown')" x-text="entry.outcome || 'unknown'"></span>
                  <span class="text-muted text-sm" x-text="entry.target || ''"></span>
                </div>
                <div class="meta">
                  <span x-show="entry.reason" x-text="entry.reason"></span>
                  <span x-show="entry.detail" x-text="JSON.stringify(entry.detail)"></span>
                  <span x-show="entry.timestamp" class="text-muted" x-text="relativeTime(entry.timestamp)"></span>
                </div>
              </div>
            </template>
          </div>
        </div>
      </div>
