decision_reason: "DECISION-TREE §2.5 (download manager frontend) recommends BISS + UCC + TIC. The frontend triggers governed downloads on the backend, so BISS classification is required; request/result discipline is enforced via EXPECTED_ENDPOINTS / EXPECTED_FIELDS / EXPECTED_PREFERENCES (UCC); and oracle-based tests in tests/test_coverage_check.py + tests/test_api_params.py provide the TIC verification layer. BGS-Verified is the smallest sufficient slice — no preflight gates or state model are needed."
