# UCC declaration artifact for ariaflow-dashboard
#
# This file is the canonical machine-readable declaration of what the
# frontend expects from the backend boundary. It's referenced by
# docs/governance/bgs-decision.yaml as evidence for the UCC member of BGS-Verified.
#
# Loaded by tests/test_api_params.py and tests/test_coverage_check.py at
# import time. Edit here, not in the test files.

# EXPECTED_PREFERENCES — every backend preference that must have a UI control.
# Verified by test_every_preference_has_ui_control in test_api_params.py.
expected_preferences:
  - auto_preflight_on_run
  - post_action_rule
  - duplicate_active_transfer_action
  - max_simultaneous_downloads
  - bandwidth_down_free_percent
  - bandwidth_down_free_absolute_mbps
  - bandwidth_up_free_percent
  - bandwidth_up_free_absolute_mbps
  - bandwidth_probe_interval_seconds
  - aria2_unsafe_options
  - max_retries
  - retry_backoff_seconds
  - aria2_max_tries
  - aria2_retry_wait
  - internal_tracker_url
  - distribute_completed_downloads
  - distribute_seed_ratio
  - distribute_max_seed_hours
  - distribute_max_active_seeds
  - auto_start_aria2
  - auto_update
  - auto_update_check_hours

# KNOWN_UNUSED — backend response fields the frontend intentionally ignores.
# Verified by test_all_backend_fields_consumed + test_known_unused_count_is_stable.
# Each entry must have a reason. Adding entries requires bumping known_unused_expected_count.
known_unused:
  endpoints: "Intentional: API catalog shown via Swagger UI link"
  cap_bytes_per_sec: "Intentional: redundant with cap_mbps"
  homebrew: "Intentional: provider-specific detail not user-facing"
  bytes_downloaded: "Intentional: bytes_completed is the display field"
  bytes_uploaded: "Intentional: bytes_completed is the display field"
  returncode: "Intentional: pass/fail icon already conveys it"
  active_url: "Intentional: per-item URL shown instead of scheduler-level active_url"
  command: "Intentional: diagnostic/provenance detail not shown in the UI"
  commands: "Intentional: lifecycle command lists are backend/operator detail"
  observed_before: "Intentional: log diff scaffolding is not rendered in the frontend"
  observed_after: "Intentional: log diff scaffolding is not rendered in the frontend"
  tls: "Intentional: peer TLS flag is not surfaced in the current dashboard"
  items_archived: "Intentional: session archived count is not shown in the current summary"
  items_downloading: "Intentional: session downloading count is collapsed into active/current views"
  items_paused: "Intentional: session paused count is not shown in the current summary"
  schema_version: "Intentional: schema version is tracked elsewhere and not displayed as item data"
  torrent_url: "Intentional: torrent download URL is not surfaced in the seeds list"

# Stability guard — must equal len(known_unused). Bumped only when fields are
# added or removed from known_unused above.
known_unused_expected_count: 17

